<!DOCTYPE html>
<html>
<head>
  <title>Statistique</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../css/style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body id="stat" class="totale-container">
  <div class="stat">
    <div class="h_totale">
      <i  class="fa-solid fa-chart-line" style="margin: 0; font-size: 35px;"></i>
      <h2 class="h1totale" id="title_stat">Statistique journalière</h2>
    </div>
    <div class="corbee">
      <canvas id="myChart"></canvas>
      
    </div> 
  </div>
<div style="display: flex">
  <div id="details" class="details-box" style="margin-top:30px; display:none;">
    <h3>Détail du jour</h3>
    <table id="detailsTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Produit</th>
          <th>Quantité</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="chart-container">
      <canvas id="categorie"></canvas>
      <div id="stats-text" class="stats-text"></div> <!-- هنا باش نعرض النص -->
  </div>
</div>
<script src="../js/statistique.js"></script>
</body>
</html>
