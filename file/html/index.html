<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CAFÉ POS</title>
  <link rel="stylesheet" href="../css/style.css" defer/>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<div class="koll">
<div>
  <i class="fa-solid fa-arrow-turn-down-left"></i>
  <h1>CAFÉ POS</h1>
  <h2>Enter access code</h2>
</div>

  <div class="pos-body" id="posBody">
    <div class="code-input">
      <div class="code-display" id="codeDisplay">
        ••••••
      </div>
    </div>

    <div class="keypad">
      <button class="key">1</button>
      <button class="key">2</button>
      <button class="key">3</button>

      <button class="key">4</button>
      <button class="key">5</button>
      <button class="key">6</button>

      <button class="key">7</button>
      <button class="key">8</button>
      <button class="key">9</button>
    </div>

    <div class="bottom-row">
      <button class="bottom-key delete-btn">
        
<i class="fa-solid fa-delete-left"></i>
      </button>
      <button class="bottom-key zero-btn">0</button>
      <button class="bottom-key enter-btn">
        
        

<i class="fa-solid fa-right-to-bracket"></i></button>
    </div>
  </div>
</div>
  <script src="../js/script.js"></script>
</body>
</html>
